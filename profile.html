<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Profile</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .app-shell { grid-template-rows: auto 1fr; }
        .profile-layout {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-6) var(--space-4);
        }
        .profile-header {
            display: flex; gap: var(--space-6);
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--space-6);
            margin-bottom: var(--space-6);
        }
        .avatar-lg {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-mono); font-size: 48px; color: var(--text-primary);
        }
        .profile-stats { display: flex; gap: var(--space-4); margin-top: var(--space-3); }
        .stat-box {
            text-align: center;
            background: var(--bg-surface); padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-sm); border: 1px solid var(--border);
            min-width: 100px;
        }

        .edit-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity var(--transition-fast);
        }
        .edit-modal.open { opacity: 1; pointer-events: auto; }
        .edit-modal-content {
            background: var(--bg-base); border: 1px solid var(--border);
            padding: var(--space-6); width: 100%; max-width: 500px;
            border-radius: var(--radius-md);
            transform: translateY(20px); transition: transform var(--transition-fast);
        }
        .edit-modal.open .edit-modal-content { transform: translateY(0); }
    </style>
</head>
<body class="app-shell">
    <nav class="nav">
        <div class="nav-container">
            <a href="feed.html" class="logo">NEXUS<span>.</span></a>
            <div class="nav-links">
                <a href="feed.html" class="btn btn-ghost">Feed</a>
                <a href="#" class="btn btn-ghost" id="nav-logout">Logout</a>
            </div>
        </div>
    </nav>

    <main class="profile-layout">
        <div class="profile-header">
            <div class="avatar-lg" id="profile-avatar">?</div>
            <div style="flex: 1;">
                <div class="flex justify-between items-center">
                    <h1 class="display-text mb-2" id="profile-username" style="font-size:32px;">...</h1>
                    <button class="btn btn-ghost" id="btn-edit-profile" style="display:none;">Edit Profile</button>
                    <button class="btn btn-ghost" id="btn-follow" style="display:none;" onclick="toast('Follow pending', 'info')">Follow</button>
                </div>
                <div class="text-secondary" id="profile-bio">Loading bio...</div>
                
                <div class="profile-stats">
                    <div class="stat-box">
                        <div class="display-text" style="font-size:24px; color:var(--accent);" id="stat-rep">0</div>
                        <div class="mono text-ghost" style="font-size:11px;">REPUTATION</div>
                    </div>
                    <div class="stat-box">
                        <div class="display-text" style="font-size:24px;" id="stat-posts">0</div>
                        <div class="mono text-ghost" style="font-size:11px;">POSTS</div>
                    </div>
                    <div class="stat-box">
                        <div class="display-text" style="font-size:24px;" id="stat-replies">0</div>
                        <div class="mono text-ghost" style="font-size:11px;">REPLIES</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-bar mb-6" id="profile-tabs">
            <div class="tab active" data-tab="posts">Posts</div>
            <div class="tab" data-tab="replies">Replies</div>
        </div>

        <div id="tab-content-posts"></div>
        <div id="tab-content-replies" style="display:none;"></div>
    </main>

    <div class="edit-modal" id="edit-modal">
        <div class="edit-modal-content">
            <h2 class="display-text mb-4">Edit Profile</h2>
            <div class="input-group">
                <label>Bio</label>
                <textarea class="input" id="edit-bio" rows="4"></textarea>
            </div>
            
            <div class="input-group mt-6">
                <label>Security</label>
                <div class="flex flex-col gap-2">
                    <button class="btn btn-ghost" onclick="toast('Password change pending', 'info')" style="width:100%;">Change Password</button>
                    <button class="btn btn-ghost" onclick="toast('2FA setup pending', 'info')" style="width:100%;">Setup 2-Factor Auth</button>
                </div>
            </div>
            
            <div class="flex justify-between mt-6 pt-4" style="border-top:1px solid var(--border);">
                <button class="btn btn-ghost" id="btn-close-modal">Cancel</button>
                <button class="btn btn-primary" id="btn-save-modal">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { api } from './js/api.js';
        import { auth } from './js/auth.js';
        import { timeAgo, escapeHTML, toast } from './js/utils.js';

        const loggedIn = auth.isLoggedIn();
        if (loggedIn) {
            document.getElementById('nav-logout').addEventListener('click', (e) => {
                e.preventDefault();
                auth.logout();
            });
        } else {
            document.getElementById('nav-logout').textContent = 'Sign In';
            document.getElementById('nav-logout').href = 'auth.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        let profileId = urlParams.get('id');
        let isOwnProfile = false;

        const loadProfile = async () => {
            try {
                const res = await api.request(`users/profile.php${profileId ? '?id='+profileId : ''}`);
                const p = res.data;
                profileId = p.id;
                
                // If API returns data using the implicit token logic, or if the user clicks their own tab, detect ownership
                isOwnProfile = !urlParams.has('id');
                
                document.getElementById('profile-avatar').textContent = p.username[0].toUpperCase();
                document.getElementById('profile-username').innerHTML = `${escapeHTML(p.username)} <span class="badge" style="vertical-align:middle; font-size:12px; background:transparent; border:1px solid var(--accent); color:var(--accent);">${escapeHTML(p.role)}</span>`;
                document.getElementById('profile-bio').textContent = p.bio || 'Silence is golden.';
                
                document.getElementById('stat-rep').textContent = p.reputation;
                document.getElementById('stat-posts').textContent = p.post_count;
                document.getElementById('stat-replies').textContent = p.reply_count;

                if (isOwnProfile) {
                    document.getElementById('btn-edit-profile').style.display = 'block';
                    document.getElementById('edit-bio').value = p.bio || '';
                } else {
                    document.getElementById('btn-follow').style.display = 'block';
                }

                loadPosts();
                loadReplies();
            } catch (e) {
                console.error(e);
                toast('Profile not found', 'danger');
                if(!loggedIn && !urlParams.has('id')) window.location.href = 'auth.html';
            }
        };

        const loadPosts = async () => {
            try {
                const res = await api.request(`users/posts.php?id=${profileId}`);
                const c = document.getElementById('tab-content-posts');
                c.innerHTML = res.data.map(p => `
                    <div style="border:1px solid var(--border); padding:var(--space-3); border-radius:var(--radius-sm); margin-bottom:12px; background:var(--bg-surface); transition:border-color var(--transition-fast);" onmouseover="this.style.borderColor='var(--text-ghost)'" onmouseout="this.style.borderColor='var(--border)'">
                        <a href="post.html?id=${p.id}" class="display-text" style="font-size:18px; color:var(--text-primary); text-decoration:none;">${escapeHTML(p.title)}</a>
                        <div class="flex gap-3 text-ghost mt-2" style="font-size:13px;">
                            <span>Score: <span class="mono">${p.upvotes - p.downvotes}</span></span>
                            <span>${timeAgo(p.created_at)}</span>
                            <span class="badge" style="background:transparent; color:${escapeHTML(p.category_color)}; border:1px solid ${escapeHTML(p.category_color)}">${escapeHTML(p.category_name)}</span>
                        </div>
                    </div>
                `).join('') || '<div class="text-ghost">No posts yet.</div>';
            } catch (e) {}
        };

        const loadReplies = async () => {
            try {
                const res = await api.request(`users/replies.php?id=${profileId}`);
                const c = document.getElementById('tab-content-replies');
                c.innerHTML = res.data.map(r => `
                    <div style="border:1px solid var(--border); border-left:3px solid var(--bg-elevated); padding:var(--space-3); border-radius:var(--radius-sm); margin-bottom:12px; background:var(--bg-surface);">
                        <div class="text-secondary" style="font-size:15px; margin-bottom:12px; line-height:1.5;">${escapeHTML(r.excerpt)}</div>
                        <div class="flex gap-4 text-ghost" style="font-size:13px; align-items:center;">
                            <a href="post.html?id=${r.post_id}" style="color:var(--accent); text-decoration:none; font-family:var(--font-mono); font-size:12px;">→ View on Post: ${escapeHTML(r.post_title)}</a>
                            <span>Score: <span class="mono">${r.upvotes - r.downvotes}</span></span>
                            <span>${timeAgo(r.created_at)}</span>
                        </div>
                    </div>
                `).join('') || '<div class="text-ghost">No replies yet.</div>';
            } catch (e) {}
        };

        // Tabs
        document.getElementById('profile-tabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('tab')) {
                document.querySelectorAll('#profile-tabs .tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                const t = e.target.dataset.tab;
                document.getElementById('tab-content-posts').style.display = t === 'posts' ? 'block' : 'none';
                document.getElementById('tab-content-replies').style.display = t === 'replies' ? 'block' : 'none';
            }
        });

        // Edit Modal
        const modal = document.getElementById('edit-modal');
        document.getElementById('btn-edit-profile').addEventListener('click', () => modal.classList.add('open'));
        document.getElementById('btn-close-modal').addEventListener('click', () => modal.classList.remove('open'));
        
        document.getElementById('btn-save-modal').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-modal');
            const bio = document.getElementById('edit-bio').value;
            btn.textContent = 'Saving...';
            try {
                await api.request('users/update.php', 'POST', { bio });
                modal.classList.remove('open');
                toast('Profile updated', 'success');
                loadProfile();
            } catch (e) {
                toast(e.message, 'danger');
            } finally {
                btn.textContent = 'Save Changes';
            }
        });

        loadProfile();
    </script>
</body>
</html>
